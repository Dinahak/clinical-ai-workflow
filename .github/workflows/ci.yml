name: Clinical AI Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12

      - name: Install dependencies
        run: |
          pip install pytest
          pip install python-dotenv
          pip install sentence-transformers
          pip install chromadb

      - name: Create env file
        run: |
          echo MODEL_NAME=qwen:1.8b > .env
          echo OLLAMA_BASE_URL=http://localhost:11434 >> .env
          echo LLM_TIMEOUT=300 >> .env
          echo CHROMA_PERSIST_DIR=./embeddings/chroma_store >> .env
          echo AUDIT_LOG_DIR=./data/audit_logs >> .env
          echo CONFIDENCE_THRESHOLD=0.1 >> .env
          echo MAX_DIFFERENTIALS=5 >> .env

      - name: Create directories
        run: |
          mkdir -p data/audit_logs
          mkdir -p embeddings/chroma_store

      - name: Run tests
        env:
          PYTHONPATH: .
        run: pytest tests/test_ci.py -v --tb=short

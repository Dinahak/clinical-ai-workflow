name: Clinical AI — Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          pip install python-dotenv
          pip install sentence-transformers
          pip install chromadb
          pip install openai-whisper

      - name: Create .env file
        run: |
          echo "MODEL_NAME=qwen:1.8b" > .env
          echo "OLLAMA_BASE_URL=http://localhost:11434" >> .env
          echo "LLM_TIMEOUT=300" >> .env
          echo "CHROMA_PERSIST_DIR=./embeddings/chroma_store" >> .env
          echo "AUDIT_LOG_DIR=./data/audit_logs" >> .env
          echo "CONFIDENCE_THRESHOLD=0.1" >> .env
          echo "MAX_DIFFERENTIALS=5" >> .env

      - name: Create required directories
        run: |
          mkdir -p data/audit_logs
          mkdir -p embeddings/chroma_store
          mkdir -p data/test_cases

      - name: Run unit tests
        run: |
          python -m pytest tests/test_unit.py -v --tb=short

      - name: Run coverage report
        run: |
          python -m pytest tests/test_unit.py --cov=utils --cov=agents --cov=tools --cov=data_processing --cov-report=term-missing
